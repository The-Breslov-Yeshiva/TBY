<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta property="og:title" content="The Breslov Yeshiva" />
  <meta name="og:description" content="An English-Speaking Yeshiva Dedicated to Healthy, Balanced Growth in Torah & Avodas Hashem">
  <meta name="og:keywords" content="Yeshiva, Breslov, Israel, Jerusalem, Torah, Talmud, Chassidus">
  <meta property="og:image" content="https://www.thebreslovyeshiva.com/yeshiva-logo-og.jpg" />
  <title>The Breslov Yeshiva | Submission Received</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#0F004B">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="navigation.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    @keyframes glow {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 0.8;
      }
    }

    @keyframes checkmark {
      0% {
        stroke-dashoffset: 100;
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      100% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .float-animation {
      animation: float 6s ease-in-out infinite;
    }

    .glow-animation {
      animation: glow 4s ease-in-out infinite;
    }

    .gradient-text {
      background: linear-gradient(to right, #60a5fa, #c084fc, #60a5fa);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient 3s ease infinite;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .hero-pattern {
      background-image:
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 100%, rgba(255, 219, 98, 0.3) 0%, transparent 50%);
    }

    .checkmark-circle {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: checkmark 2s ease-in-out forwards;
      animation-delay: 0.5s;
    }

    .pulse-ring {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }
    }
  </style>
</head>

<body class="bg-gray-950 min-h-screen overflow-x-hidden">
  <site-navigation></site-navigation>

  <!-- Animated background -->
  <div class="fixed inset-0 -z-10">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-950 via-gray-900 to-purple-950"></div>
    <div class="absolute inset-0 hero-pattern opacity-30"></div>
    <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-700 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation"></div>
    <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-700 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation" style="animation-delay: 2s;"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-700 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation" style="animation-delay: 4s;"></div>
  </div>

  <main class="site-main-shell relative">
    <!-- Success Section -->
    <section class="relative min-h-screen flex items-center justify-center px-6 pt-32 lg:px-8">
      <div class="relative z-10 mx-auto max-w-4xl text-center">
        <!-- Success Icon with Animation -->
        <div class="mb-12 flex justify-center">
          <div class="relative">
            <div class="w-32 h-32 bg-gradient-to-r from-green-500 to-emerald-600 rounded-full flex items-center justify-center pulse-ring shadow-2xl">
              <svg class="w-16 h-16 text-white checkmark-circle" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
              </svg>
            </div>
            <!-- Floating particles around success icon -->
            <div class="absolute -top-2 -right-2 w-4 h-4 bg-yellow-400 rounded-full glow-animation"></div>
            <div class="absolute -bottom-2 -left-2 w-3 h-3 bg-pink-400 rounded-full glow-animation" style="animation-delay: 1s;"></div>
            <div class="absolute top-1/2 -right-4 w-2 h-2 bg-blue-400 rounded-full glow-animation" style="animation-delay: 2s;"></div>
          </div>
        </div>

        <!-- Success Message -->
        <h1 class="text-5xl font-bold tracking-tight text-white sm:text-7xl mb-8 drop-shadow-2xl">
          <span class="gradient-text">Submission Received!</span>
        </h1>

        <p class="mt-8 text-2xl leading-8 text-gray-100 max-w-3xl mx-auto drop-shadow-lg mb-12">
          Thank you for your interest in The Breslov Yeshiva. <br>We will be reaching out to you soon.
        </p>



        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
          <a href="/"
            class="rounded-full bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-4 text-lg font-semibold text-white shadow-lg hover:from-indigo-500 hover:to-blue-500 transition-all duration-300 hover:scale-105 hover:shadow-xl hover:shadow-indigo-500/25">
            Return to Homepage
          </a>
        </div>


      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-main-shell relative border-t border-white/10 bg-gray-950/50 backdrop-blur-lg">
    <div class="mx-auto max-w-7xl px-6 py-12 lg:px-8">
      <div class="flex flex-col gap-4 md:flex-row items-center justify-between">
        <div class="flex items-center space-x-4 mb-4 md:mb-0">
          <img class="h-12 w-auto" src="yeshiva-logo-web.png" alt="Yeshivas Uvacharta Bachayim" width="1600" height="785" decoding="async" />
          <div class="text-sm text-gray-400">
            <p>&copy; 2026 The Breslov Yeshiva</p>
            <p>Nurturing Torah Scholars Since Our Founding</p>
          </div>
        </div>
        <nav class="flex flex-wrap justify-center gap-4 text-sm text-gray-400" aria-label="Legal footer">
          <a href="/privacy" class="hover:text-white">Privacy</a>
          <a href="/terms" class="hover:text-white">Terms</a>
          <a href="/accessibility" class="hover:text-white">Accessibility</a>
        </nav>
      </div>
    </div>
  </footer>
</body>

</html>
